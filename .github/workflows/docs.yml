name: docs

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docs/**"
      - "docfx/**"
      - "docfx.json"
      - "*.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Install DocFX
        run: dotnet tool install --global docfx --version 2.78.3

      - name: Restore solution
        run: dotnet restore PostQuantum.DataProtection.slnx

      - name: Build (so docfx can read the assemblies and XML docs)
        run: dotnet build PostQuantum.DataProtection.slnx -c Release --no-restore

      - name: Run docfx
        run: docfx docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docfx/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
