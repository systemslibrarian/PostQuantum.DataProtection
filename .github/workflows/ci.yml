name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SourceLink wants the full history

      - name: Set up .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore PostQuantum.DataProtection.slnx

      - name: Build (Release, all targets, zero warnings)
        run: dotnet build PostQuantum.DataProtection.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/PostQuantum.DataProtection.Tests/PostQuantum.DataProtection.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Pack
        run: dotnet pack src/PostQuantum.DataProtection/PostQuantum.DataProtection.csproj -c Release --no-build -o artifacts

      - name: Upload .nupkg / .snupkg
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.*nupkg
          if-no-files-found: error
